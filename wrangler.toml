# MrDemonWolf, Inc. — Image CDN Worker
name = "shottr"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Custom domain
routes = [
  { pattern = "img.mrdemonwolf.com/*", zone_name = "mrdemonwolf.com" }
]

# Auth secret — set via: npx wrangler secret put AUTH_TOKEN

# R2 bucket binding
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "shottr"
