# MrDemonWolf, Inc. — Image CDN Worker
name = "shottr"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Custom domain
routes = [
  { pattern = "img.mrdemonwolf.com/*", zone_name = "mrdemonwolf.com" }
]

# S3 access key ID — set via: npx wrangler secret put S3_ACCESS_KEY_ID
# (optional) S3 secret key — set via: npx wrangler secret put S3_SECRET_ACCESS_KEY

# R2 bucket binding
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "shottr"
